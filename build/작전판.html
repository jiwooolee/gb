<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>농구 전술 보드 메이커</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; margin: 0; overflow: hidden; }
        #toolbar { background: #34495e; width: 100%; padding: 10px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; z-index: 10; }
        #court-container { position: relative; margin-top: 20px; border: 3px solid white; background: #e67e22; width: 600px; height: 520px; overflow: hidden; }
        
        /* 농구 코트 라인 구현 */
        .line { position: absolute; border: 2px solid white; pointer-events: none; }
        .backboard { width: 100px; height: 2px; top: 40px; left: 250px; }
        .rim { width: 40px; height: 40px; border-radius: 50%; top: 45px; left: 280px; }
        .key-area { width: 180px; height: 190px; top: 0; left: 210px; border-top: none; }
        .three-point { width: 520px; height: 400px; border-radius: 0 0 260px 260px; top: -150px; left: 40px; }
        
        canvas { position: absolute; top: 0; left: 0; cursor: crosshair; }
        .player { position: absolute; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: move; user-select: none; z-index: 5; border: 2px solid white; }
        .home { background: #3498db; }
        .away { background: #e74c3c; }
        .ball { background: #ff9f43; width: 20px; height: 20px; z-index: 6; border: 1px solid black; }
        
        button { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-blue { background: #3498db; color: white; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-gray { background: #95a5a6; color: white; }
    </style>
</head>
<body>

<div id="toolbar">
    <button class="btn-blue" onclick="addPlayer('home')">우리팀 추가</button>
    <button class="btn-red" onclick="addPlayer('away')">상대팀 추가</button>
    <button class="btn-orange" onclick="addBall()">공 추가</button>
    <button class="btn-gray" onclick="clearLines()">선 지우기</button>
    <button class="btn-green" onclick="saveFrame()">현재 장면 저장</button>
    <button class="btn-green" onclick="playAnimation()">▶ 전술 재생</button>
    <button id="recBtn" style="background: #c0392b; color: white;" onclick="toggleRecording()">영상 녹화 시작</button>
    <span id="frameCounter">장면: 0</span>
</div>

<div id="court-container" id="captureArea">
    <div class="line backboard"></div>
    <div class="line rim"></div>
    <div class="line key-area"></div>
    <div class="line three-point"></div>
    
    <canvas id="paintCanvas" width="600" height="520"></canvas>
</div>

<script>
    const container = document.getElementById('court-container');
    const canvas = document.getElementById('paintCanvas');
    const ctx = canvas.getContext('2d');
    const frameCounter = document.getElementById('frameCounter');
    
    let isDrawing = false;
    let players = [];
    let frames = [];
    let mediaRecorder;
    let recordedChunks = [];

    // --- 선수/공 관리 ---
    function addPlayer(type) {
        const p = document.createElement('div');
        p.className = `player ${type}`;
        p.innerText = type === 'home' ? 'H' : 'A';
        p.style.left = '50px'; p.style.top = '50px';
        makeDraggable(p);
        container.appendChild(p);
        players.push(p);
    }

    function addBall() {
        const b = document.createElement('div');
        b.className = 'player ball';
        b.style.left = '290px'; b.style.top = '250px';
        makeDraggable(b);
        container.appendChild(b);
        players.push(b);
    }

    function makeDraggable(el) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        el.onmousedown = (e) => {
            e.preventDefault();
            pos3 = e.clientX; pos4 = e.clientY;
            document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
            document.onmousemove = (e) => {
                pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
                pos3 = e.clientX; pos4 = e.clientY;
                el.style.top = (el.offsetTop - pos2) + "px";
                el.style.left = (el.offsetLeft - pos1) + "px";
            };
        };
    }

    // --- 선 그리기 기능 ---
    canvas.onmousedown = () => isDrawing = true;
    canvas.onmouseup = () => { isDrawing = false; ctx.beginPath(); };
    canvas.onmousemove = (e) => {
        if (!isDrawing) return;
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.strokeStyle = 'white';
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();
    };

    function clearLines() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    // --- 애니메이션 시스템 ---
    function saveFrame() {
        const currentFrame = players.map(p => ({
            el: p,
            x: p.style.left,
            y: p.style.top
        }));
        frames.push(currentFrame);
        frameCounter.innerText = `장면: ${frames.length}`;
        alert("현재 위치가 저장되었습니다. 다음 움직임을 만들어주세요.");
    }

    async function playAnimation() {
        if (frames.length < 2) return alert("최소 2개 이상의 장면을 저장해야 합니다.");
        
        for (let i = 0; i < frames.length; i++) {
            const frame = frames[i];
            frame.forEach(data => {
                data.el.style.transition = "all 1s ease-in-out";
                data.el.style.left = data.x;
                data.el.style.top = data.y;
            });
            await new Promise(r => setTimeout(r, 1100));
        }
        players.forEach(p => p.style.transition = "none");
    }

    // --- 영상 녹화 (Output) ---
    function toggleRecording() {
        const btn = document.getElementById('recBtn');
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            startRecording();
            btn.innerText = "🔴 녹화 중지 (저장)";
        } else {
            mediaRecorder.stop();
            btn.innerText = "영상 녹화 시작";
        }
    }

    function startRecording() {
        const stream = canvas.parentElement.ownerDocument.defaultView.window.document.body.parentNode.lastChild.previousSibling.previousSibling.previousSibling.captureStream ? // 호환성 체크
                     canvas.captureStream() : null; 
        // 실제로는 전체 화면 녹화가 직관적이므로 간단히 canvas 스트림만 예시로 둡니다.
        // 여기서는 브라우저의 화면 공유 API를 사용하는 것이 결과물이 깔끔합니다.
        alert("브라우저의 녹화 기능을 사용합니다. '재생'을 눌러 전술을 보여준 후 중지를 눌러주세요.");
        
        navigator.mediaDevices.getDisplayMedia({ video: true }).then(stream => {
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'basketball_tactics.webm';
                a.click();
                recordedChunks = [];
            };
            mediaRecorder.start();
        });
    }
</script>

</body>
</html>
